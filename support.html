<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#11110f">
  <title>支持 - 音频调音</title>
  <style>
    body { margin: 0; background: #11110f; color: #f2f0e8; font-family: "SF Pro Display", "PingFang SC", sans-serif; line-height: 1.75; letter-spacing: 0; }
    main { width: min(820px, calc(100% - 32px)); margin: 0 auto; padding: 36px 0 52px; }
    a { color: #74c58c; text-decoration: none; }
    h1 { margin: 0 0 18px; font-size: 28px; }
    h2 { margin: 28px 0 8px; font-size: 17px; }
    p, li { color: #c9c5ba; }
    .back { display: inline-block; margin-bottom: 22px; color: #a9a59a; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="./">返回音频调音</a>
    <h1>支持</h1>
    <p>如果你在导入、变调或导出 WAV/MP3 时遇到问题，可以联系支持邮箱。</p>
    <h2>联系方式</h2>
    <p><a href="mailto:wyhzzp@qq.com">wyhzzp@qq.com</a></p>
    <h2>反馈时建议包含</h2>
    <ul>
      <li>你使用的浏览器，例如 Chrome、Safari、Edge。</li>
      <li>音频格式，例如 WAV 或 MP3。</li>
      <li>大致文件大小和时长。</li>
      <li>出现问题的步骤或截图。</li>
    </ul>
    <h2>当前范围</h2>
    <p>当前 Web 版优先支持 WAV 和 MP3。M4A/AAC 暂不作为首版支持范围。</p>
  </main>

</html>
